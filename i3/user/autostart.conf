# notifications
exec_always --no-startup-id dunst 

# lock screen on suspend
exec_always --no-startup-id xss-lock -- i3lock -n

# load colors from Xresources
exec_always --no-startup-id sleep 1 && xrdb -merge ~/.Xresources

# blue light filter
exec_always --no-startup-id redshift

# auto-mount USB
exec_always --no-startup-id udiskie

# restore last wallpaper from cache
exec_always --no-startup-id ~/.config/i3/scripts/rofi-wallpaper --reset

# touchpad settings (fallback — Xorg config does the same at driver level)
exec_always --no-startup-id sleep 2 && xinput set-prop "FTCS1000:01 2808:0222 Touchpad" "libinput Natural Scrolling Enabled" 1 && xinput set-prop "FTCS1000:01 2808:0222 Touchpad" "libinput Tapping Enabled" 1 && xinput set-prop "FTCS1000:01 2808:0222 Touchpad" "libinput Accel Profile Enabled" 0 1 && xinput set-prop "FTCS1000:01 2808:0222 Touchpad" "libinput Accel Speed" -0.39

